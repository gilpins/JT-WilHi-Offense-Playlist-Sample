
<title>WilHi Offense — Play Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c1220;
  --surface: #14203a;
  --raised:  #1c2e4a;
  --border:  #28405e;
  --text:    #c8daf0;
  --muted:   #567090;
  --label:   #7a9ab8;
  --amber:   #c8900a;
  --amber-l: #f0b429;
  --rush:    #d45520;
  --pass:    #3a8fd4;
  --td:      #28b068;
  --turn:    #c43838;
  --mono: 'Courier New', 'Lucida Console', monospace;
  --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
}

html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

body { min-height: 100vh; }

/* ── HEADER ── */
#hdr {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 2px solid var(--amber);
  display: flex; flex-direction: column;
}
.hdr-top {
  display: flex; align-items: baseline; gap: 12px;
  padding: 10px 18px 6px;
  border-bottom: 1px solid var(--border);
}
.brand {
  font-family: var(--mono); font-size: 18px; font-weight: bold;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber-l);
}
.brand-sub {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted);
}
.hdr-meta {
  margin-left: auto; font-family: var(--mono); font-size: 11px;
  color: var(--muted); letter-spacing: 0.06em;
}

/* ── TABS ── */
.tab-row {
  display: flex; gap: 0; overflow-x: auto;
  padding: 0 18px;
  scrollbar-width: none;
}
.tab-row::-webkit-scrollbar { display: none; }
.tab-btn {
  font-family: var(--mono); font-size: 11px; font-weight: bold;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); background: none; border: none;
  padding: 9px 16px; cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap; transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--label); }
.tab-btn.active { color: var(--amber-l); border-bottom-color: var(--amber-l); }
.tab-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: -2px; }

/* ── LAYOUT ── */
#main { padding: 18px; max-width: 1100px; margin: 0 auto; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
@media (max-width: 700px) {
  .grid4 { grid-template-columns: repeat(2, 1fr); }
  .grid3 { grid-template-columns: 1fr 1fr; }
  .grid2 { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .grid3 { grid-template-columns: 1fr; }
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px;
}
.card-title {
  font-family: var(--mono); font-size: 10px; font-weight: bold;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--label); margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}

/* ── KPI BLOCKS ── */
.kpi {
  background: var(--surface); border: 1px solid var(--border);
  padding: 14px 16px;
}
.kpi-val {
  font-family: var(--mono); font-size: 32px; font-weight: bold;
  font-variant-numeric: tabular-nums; color: var(--amber-l);
  line-height: 1.1;
}
.kpi-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted); margin-top: 4px;
}
.kpi-sub {
  font-family: var(--mono); font-size: 11px; color: var(--label);
  margin-top: 6px; font-variant-numeric: tabular-nums;
}

/* ── SPLIT BAR ── */
.split-bar-wrap { margin-top: 6px; }
.split-bar-labels {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10px;
  color: var(--muted); margin-bottom: 5px; letter-spacing: 0.1em;
}
.split-bar {
  height: 8px; background: var(--raised);
  border: 1px solid var(--border); display: flex; overflow: hidden;
}
.split-bar-run { background: var(--rush); transition: width 0.4s; }
.split-bar-pass { background: var(--pass); transition: width 0.4s; }

/* ── HORIZONTAL BAR CHART ── */
.bar-chart { display: flex; flex-direction: column; gap: 7px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label {
  font-family: var(--mono); font-size: 10px; color: var(--label);
  width: 160px; flex-shrink: 0; letter-spacing: 0.04em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-align: right;
}
.bar-track {
  flex: 1; height: 14px; background: var(--raised);
  border: 1px solid var(--border); display: flex; overflow: hidden;
}
.bar-fill-run { background: var(--rush); height: 100%; }
.bar-fill-pass { background: var(--pass); height: 100%; }
.bar-fill-both { background: var(--amber); height: 100%; }
.bar-fill-stack { display: flex; height: 100%; }
.bar-val {
  font-family: var(--mono); font-size: 10px; color: var(--label);
  width: 36px; flex-shrink: 0; font-variant-numeric: tabular-nums;
}

/* ── TABLES ── */
.tbl-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse; font-family: var(--mono);
  font-size: 12px; font-variant-numeric: tabular-nums;
}
thead th {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted); padding: 7px 10px;
  border-bottom: 1px solid var(--border); text-align: right;
  background: var(--bg);
}
thead th:first-child { text-align: left; }
tbody tr { border-bottom: 1px solid rgba(40,64,94,0.5); }
tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody td {
  padding: 8px 10px; color: var(--text); text-align: right;
}
tbody td:first-child { text-align: left; }
.jersey {
  display: inline-block; width: 24px; height: 24px;
  background: var(--raised); border: 1px solid var(--border);
  font-size: 11px; font-weight: bold; text-align: center;
  line-height: 24px; color: var(--amber-l); margin-right: 6px;
  flex-shrink: 0;
}
.player-cell { display: flex; align-items: center; }

td.td-count { color: var(--td); font-weight: bold; }
td.turn-count { color: var(--turn); }
td.rush-col { color: var(--rush); }
td.pass-col { color: var(--pass); }
td.amber-col { color: var(--amber-l); font-weight: bold; }

/* ── DOWN/DIST GRID ── */
.dn-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.dn-cell {
  background: var(--raised); border: 1px solid var(--border);
  padding: 12px 10px; text-align: center;
}
.dn-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.dn-pct {
  font-family: var(--mono); font-size: 22px; font-weight: bold;
  color: var(--text); font-variant-numeric: tabular-nums;
}
.dn-sub {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  margin-top: 4px;
}

/* ── SECTION SPACING ── */
.section { margin-top: 20px; }
.section-head {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--amber); margin-bottom: 12px;
  padding-left: 8px; border-left: 2px solid var(--amber);
}

/* ── PLAY LOG ── */
.play-log {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 320px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.play-row {
  display: grid;
  grid-template-columns: 40px 28px 36px 80px 1fr 50px;
  gap: 6px; align-items: center;
  padding: 6px 8px; font-family: var(--mono); font-size: 11px;
  border-bottom: 1px solid rgba(40,64,94,0.4);
}
.play-row:hover { background: rgba(255,255,255,0.03); }
.play-dn { color: var(--muted); }
.play-type-r { color: var(--rush); font-weight: bold; text-transform: uppercase; }
.play-type-p { color: var(--pass); font-weight: bold; text-transform: uppercase; }
.play-form { color: var(--label); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.play-name { color: var(--text); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.play-yds { text-align: right; font-weight: bold; font-variant-numeric: tabular-nums; }
.play-yds.pos { color: var(--td); }
.play-yds.neg { color: var(--turn); }
.play-yds.expl { color: var(--amber-l); }

/* ── TENDENCY BULLETS ── */
.tendency-list { display: flex; flex-direction: column; gap: 10px; }
.tendency-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 12px; background: var(--raised);
  border: 1px solid var(--border); border-left: 3px solid var(--amber);
}
.tend-num {
  font-family: var(--mono); font-size: 20px; font-weight: bold;
  color: var(--amber); min-width: 36px; font-variant-numeric: tabular-nums;
}
.tend-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
}
.tend-text { font-size: 12px; color: var(--text); line-height: 1.5; }

/* ── QUARTER BARS ── */
.qtr-bars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.qtr-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.qtr-bar-wrap { width: 100%; height: 80px; display: flex; align-items: flex-end; }
.qtr-bar-inner {
  width: 100%; background: var(--pass); transition: height 0.4s;
  border-top: 2px solid var(--amber);
}
.qtr-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
.qtr-val { font-family: var(--mono); font-size: 12px; font-weight: bold; color: var(--amber-l); font-variant-numeric: tabular-nums; }

/* ── SEPARATOR ── */
.sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>

<div id="hdr">
  <div class="hdr-top">
    <span class="brand">WilHi</span>
    <span class="brand-sub">Offensive Analytics</span>
    <span class="hdr-meta" id="hdrMeta"></span>
  </div>
  <div class="tab-row" id="tabRow"></div>
</div>

<main id="main">
  <div id="tab-overview" class="tab-pane active"></div>
  <div id="tab-run"      class="tab-pane"></div>
  <div id="tab-pass"     class="tab-pane"></div>
  <div id="tab-form"     class="tab-pane"></div>
  <div id="tab-gameplan" class="tab-pane"></div>
</main>

<script>
// ─────────────────────────────────────────────
//  RAW CSV (injected by build step)
// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
//  CSV PARSER
// ─────────────────────────────────────────────
function parseCSVLine(line) {
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  out.push(cur.trim());
  return out;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const row = {};
    headers.forEach((h, i) => row[h.trim()] = (vals[i] || '').trim());
    return row;
  });
}

// ─────────────────────────────────────────────
//  DATA PROCESSING
// ─────────────────────────────────────────────
const _loader = document.createElement('div');
_loader.id = 'appLoader';
_loader.style.cssText = 'position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;font-size:13px';
_loader.textContent = 'LOADING DATA…';
document.body.appendChild(_loader);

(async () => {
  let csvText;
  try {
    const res = await fetch('data.csv');
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — could not load data.csv');
    csvText = await res.text();
  } catch (err) {
    _loader.innerHTML =
      '<div style="text-align:center">' +
      '<div style="color:var(--turn);margin-bottom:12px">⚠ ' + err.message + '</div>' +
      '<div style="color:var(--muted);font-size:11px;max-width:360px;line-height:1.6">Ensure data.csv is in the same folder and served over HTTP (not opened as a local file).</div>' +
      '</div>';
    return;
  }

  document.getElementById('appLoader').remove();

  const raw = parseCSV(csvText);

// Only offensive plays with a play type
const plays = raw.filter(r =>
  r['ODK'] === 'O' &&
  (r['PLAY TYPE'] === 'Run' || r['PLAY TYPE'] === 'Pass')
);

function num(s) {
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function isComplete(r) {
  return /complete/i.test(r['RESULT']) && !/penalty/i.test(r['RESULT']);
}
function isTD(r)       { return /\bTD\b/i.test(r['RESULT']); }
function isINT(r)       { return /interception/i.test(r['RESULT']); }
function isFumble(r)    { return /fumble/i.test(r['RESULT']); }
function isSack(r)      { return r['RESULT'] === 'Sack'; }
function isScramble(r)  { return /scramble/i.test(r['RESULT']); }
function isRush(r)      { return /rush/i.test(r['RESULT']) || r['PLAY TYPE'] === 'Run'; }

function yds(r) { return num(r['GN/LS']); }

// Totals
const totalPlays = plays.length;
const runPlays   = plays.filter(r => r['PLAY TYPE'] === 'Run');
const passPlays  = plays.filter(r => r['PLAY TYPE'] === 'Pass');
const totalYards = plays.reduce((s, r) => s + Math.max(0, yds(r)), 0);
const touchdowns = plays.filter(isTD).length;
const interceptions = plays.filter(isINT).length;
const fumbles   = plays.filter(isFumble).length;
const turnovers = interceptions + fumbles;

const completions = passPlays.filter(isComplete);
const incompletes = passPlays.filter(r => r['RESULT'] === 'Incomplete');
const sacks       = passPlays.filter(isSack);
const scrambles   = passPlays.filter(isScramble);
const compRate    = passPlays.length > 0 ? (completions.length / passPlays.length * 100) : 0;

const runYards  = runPlays.reduce((s, r) => s + yds(r), 0);
const passYards = passPlays.reduce((s, r) => s + yds(r), 0);
const yardsPerPlay = totalPlays ? (totalYards / totalPlays).toFixed(1) : '0';

// 3rd down
const thirdDowns  = plays.filter(r => r['DN'] === '3');
const thirdConv   = thirdDowns.filter(r => yds(r) >= num(r['DIST'])).length;
const thirdRate   = thirdDowns.length ? (thirdConv / thirdDowns.length * 100) : 0;

// Red zone (yard line 1–20 = inside opponent 20)
const redZone   = plays.filter(r => { const y = num(r['YARD LN']); return y >= 1 && y <= 20; });
const rzTDs     = redZone.filter(isTD).length;
const rzRate    = redZone.length ? (rzTDs / redZone.length * 100) : 0;

// Explosive plays (15+ yards)
const explosive = plays.filter(r => yds(r) >= 15).sort((a, b) => yds(b) - yds(a));

// ── RUSHER STATS ──
const rusherMap = {};
runPlays.forEach(r => {
  const name = r['RUSHER_Name'];
  if (!name) return;
  if (!rusherMap[name]) rusherMap[name] = { jersey: r['RUSHER_Jersey'], carries: 0, yards: 0, tds: 0, fumbles: 0, long: 0 };
  const s = rusherMap[name];
  s.carries++;
  s.yards += yds(r);
  if (isTD(r)) s.tds++;
  if (isFumble(r)) s.fumbles++;
  if (yds(r) > s.long) s.long = yds(r);
});
const rushers = Object.entries(rusherMap)
  .map(([name, s]) => ({ name, ...s, avg: s.carries ? (s.yards / s.carries).toFixed(1) : '0.0' }))
  .sort((a, b) => b.yards - a.yards);

// ── QB STATS ──
const qbMap = {};
passPlays.forEach(r => {
  const name = r['PASSER_Name'];
  if (!name) return;
  if (!qbMap[name]) qbMap[name] = { jersey: r['PASSER_Jersey'], att: 0, comp: 0, yards: 0, tds: 0, ints: 0, sacks: 0, scrm: 0, scrmYds: 0 };
  const q = qbMap[name];
  q.att++;
  if (isComplete(r)) { q.comp++; q.yards += yds(r); }
  if (isTD(r)) q.tds++;
  if (isINT(r)) q.ints++;
  if (isSack(r)) q.sacks++;
  if (isScramble(r)) { q.scrm++; q.scrmYds += yds(r); }
});
const qbs = Object.entries(qbMap)
  .map(([name, s]) => ({ name, ...s }))
  .sort((a, b) => b.att - a.att);

// ── RECEIVER STATS ──
const recvMap = {};
passPlays.forEach(r => {
  const name = r['RECEIVER_Name'];
  if (!name || isINT(r) || isSack(r)) return;
  if (!recvMap[name]) recvMap[name] = { jersey: r['RECEIVER_Jersey'], targets: 0, catches: 0, yards: 0, tds: 0, long: 0 };
  const s = recvMap[name];
  s.targets++;
  if (isComplete(r)) {
    s.catches++;
    s.yards += yds(r);
    if (yds(r) > s.long) s.long = yds(r);
  }
  if (isTD(r) && isComplete(r)) s.tds++;
});
const receivers = Object.entries(recvMap)
  .map(([name, s]) => ({ name, ...s, avg: s.catches ? (s.yards / s.catches).toFixed(1) : '0.0' }))
  .sort((a, b) => b.yards - a.yards);

// Shorten Kawaihuihuiokekuahiwi
function shortName(n) {
  if (n.length > 16) return n.split(' ').map((p, i) => i === 0 ? p.charAt(0) + '.' : p).join(' ');
  return n;
}

// ── FORMATION STATS ──
const formMap = {};
plays.forEach(r => {
  let f = r['OFF FORM'].trim().toUpperCase();
  if (!f) f = 'UNKNOWN';
  if (!formMap[f]) formMap[f] = { total: 0, run: 0, pass: 0, yards: 0, tds: 0 };
  const s = formMap[f];
  s.total++;
  if (r['PLAY TYPE'] === 'Run') s.run++;
  else s.pass++;
  s.yards += Math.max(0, yds(r));
  if (isTD(r)) s.tds++;
});
const formations = Object.entries(formMap)
  .map(([name, s]) => ({ name, ...s, ypp: s.total ? (s.yards / s.total).toFixed(1) : '0.0' }))
  .sort((a, b) => b.total - a.total)
  .slice(0, 20);

// ── DOWN STATS ──
const downMap = { '1': { plays: 0, run: 0, pass: 0, yards: 0 }, '2': { plays: 0, run: 0, pass: 0, yards: 0 }, '3': { plays: 0, run: 0, pass: 0, yards: 0 }, '4': { plays: 0, run: 0, pass: 0, yards: 0 } };
plays.forEach(r => {
  const d = r['DN'];
  if (!downMap[d]) return;
  downMap[d].plays++;
  downMap[d].yards += Math.max(0, yds(r));
  if (r['PLAY TYPE'] === 'Run') downMap[d].run++;
  else downMap[d].pass++;
});

// ── QUARTER STATS ──
const qtrMap = { '1': { plays: 0, yards: 0, tds: 0 }, '2': { plays: 0, yards: 0, tds: 0 }, '3': { plays: 0, yards: 0, tds: 0 }, '4': { plays: 0, yards: 0, tds: 0 } };
plays.forEach(r => {
  const q = r['QTR'];
  if (!qtrMap[q]) return;
  qtrMap[q].plays++;
  qtrMap[q].yards += Math.max(0, yds(r));
  if (isTD(r)) qtrMap[q].tds++;
});

// ── PLAY CONCEPTS ──
function conceptKey(r) { return r['OFF PLAY'].trim().toUpperCase(); }
const runConceptMap = {}, passConceptMap = {};
runPlays.forEach(r => {
  const k = conceptKey(r);
  if (!k) return;
  if (!runConceptMap[k]) runConceptMap[k] = { count: 0, yards: 0, tds: 0 };
  runConceptMap[k].count++;
  runConceptMap[k].yards += yds(r);
  if (isTD(r)) runConceptMap[k].tds++;
});
passPlays.forEach(r => {
  const k = conceptKey(r);
  if (!k) return;
  if (!passConceptMap[k]) passConceptMap[k] = { count: 0, yards: 0, tds: 0, comp: 0, att: 0 };
  passConceptMap[k].att++;
  if (isComplete(r)) { passConceptMap[k].comp++; passConceptMap[k].yards += yds(r); }
  if (isTD(r)) passConceptMap[k].tds++;
  passConceptMap[k].count++;
});
const topRunConcepts = Object.entries(runConceptMap)
  .map(([name, s]) => ({ name, ...s, avg: s.count ? (s.yards / s.count).toFixed(1) : '0.0' }))
  .sort((a, b) => b.count - a.count).slice(0, 12);
const topPassConcepts = Object.entries(passConceptMap)
  .map(([name, s]) => ({ name, ...s, avg: s.att ? (s.yards / s.att).toFixed(1) : '0.0' }))
  .sort((a, b) => b.att - a.att).slice(0, 12);

// ─────────────────────────────────────────────
//  RENDER HELPERS
// ─────────────────────────────────────────────
function pct(n) { return Math.round(n) + '%'; }
function f1(n)  { return parseFloat(n).toFixed(1); }

function renderKPI(val, label, sub) {
  return `<div class="kpi">
    <div class="kpi-val">${val}</div>
    <div class="kpi-label">${label}</div>
    ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
  </div>`;
}

function renderBar(label, run, pass, total, maxTotal) {
  const runPct  = total ? (run  / total * 100).toFixed(1) : 0;
  const passPct = total ? (pass / total * 100).toFixed(1) : 0;
  const barPct  = maxTotal ? (total / maxTotal * 100) : 100;
  return `<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track" style="position:relative;">
      <div class="bar-fill-stack" style="width:${barPct}%">
        <div class="bar-fill-run"  style="width:${runPct}%;"></div>
        <div class="bar-fill-pass" style="width:${passPct}%;"></div>
      </div>
    </div>
    <div class="bar-val">${total}</div>
  </div>`;
}

function renderPlayTypeChip(r) {
  if (r['PLAY TYPE'] === 'Run') return '<span class="play-type-r">RUN</span>';
  return '<span class="play-type-p">PAS</span>';
}

function ydsClass(y) {
  if (y >= 15) return 'expl';
  if (y > 0) return 'pos';
  if (y < 0) return 'neg';
  return '';
}

function renderPlayRow(r) {
  const d = r['DN'] && r['DIST'] ? `${r['DN']}&amp;&${r['DIST']}` : '';
  const y = yds(r);
  const yStr = y > 0 ? '+' + y : y;
  const actor = r['RUSHER_Name'] || r['RECEIVER_Name'] || r['PASSER_Name'] || '';
  return `<div class="play-row">
    <span class="play-dn">${r['DN'] || ''}${r['DIST'] ? '&' + r['DIST'] : ''}</span>
    ${renderPlayTypeChip(r)}
    <span class="play-dn">${r['QTR'] ? 'Q' + r['QTR'] : ''}</span>
    <span class="play-form">${(r['OFF FORM'] || '').slice(0, 14)}</span>
    <span class="play-name">${r['OFF PLAY'] || ''}</span>
    <span class="play-yds ${ydsClass(y)}">${isTD(r) ? '⬛TD' : yStr}</span>
  </div>`;
}

// ─────────────────────────────────────────────
//  TAB RENDERS
// ─────────────────────────────────────────────

function renderOverview() {
  const runPct  = totalPlays ? (runPlays.length  / totalPlays * 100).toFixed(1) : 0;
  const passPct = totalPlays ? (passPlays.length / totalPlays * 100).toFixed(1) : 0;
  const avgRun  = runPlays.length  ? (runYards  / runPlays.length).toFixed(1)  : '0.0';
  const avgPass = passPlays.length ? (passYards / passPlays.length).toFixed(1) : '0.0';

  const maxQtrYds = Math.max(...Object.values(qtrMap).map(q => q.yards));

  const qtrBars = [1,2,3,4].map(q => {
    const d = qtrMap[q.toString()];
    const h = maxQtrYds ? Math.round(d.yards / maxQtrYds * 80) : 0;
    return `<div class="qtr-col">
      <div class="qtr-bar-wrap"><div class="qtr-bar-inner" style="height:${h}px;"></div></div>
      <div class="qtr-label">Q${q}</div>
      <div class="qtr-val">${d.yards}</div>
    </div>`;
  }).join('');

  return `
    <div class="grid4">
      ${renderKPI(totalPlays, 'Total Plays', `${pct(parseFloat(runPct))} run · ${pct(parseFloat(passPct))} pass`)}
      ${renderKPI(totalYards, 'Total Yards', `${yardsPerPlay} yds / play`)}
      ${renderKPI(touchdowns, 'Touchdowns', `${rzTDs} red zone TDs (${pct(rzRate)})`)}
      ${renderKPI(turnovers,  'Turnovers',  `${interceptions} INT · ${fumbles} FUM`)}
    </div>

    <div class="grid4 section">
      ${renderKPI(pct(compRate),   'Completion %', `${completions.length}/${passPlays.length} attempts`)}
      ${renderKPI(pct(thirdRate),  '3rd Down Conv', `${thirdConv}/${thirdDowns.length} converted`)}
      ${renderKPI(pct(rzRate),     'Red Zone TD%',  `${redZone.length} red zone plays`)}
      ${renderKPI(explosive.length,'Explosive 15+',  `${explosive.filter(r => yds(r) >= 25).length} plays 25+ yds`)}
    </div>

    <div class="grid2 section">
      <div class="card">
        <div class="card-title">Run / Pass Split</div>
        <div class="grid2">
          <div>
            <div style="font-family:var(--mono);font-size:28px;font-weight:bold;color:var(--rush)">${pct(parseFloat(runPct))}</div>
            <div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:4px">Rush</div>
            <div style="font-family:var(--mono);font-size:11px;color:var(--label);margin-top:4px">${runPlays.length} plays · ${runYards} yds · ${avgRun} avg</div>
          </div>
          <div>
            <div style="font-family:var(--mono);font-size:28px;font-weight:bold;color:var(--pass)">${pct(parseFloat(passPct))}</div>
            <div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:4px">Pass</div>
            <div style="font-family:var(--mono);font-size:11px;color:var(--label);margin-top:4px">${passPlays.length} plays · ${passYards} yds · ${avgPass} avg</div>
          </div>
        </div>
        <div class="split-bar-wrap" style="margin-top:14px">
          <div class="split-bar-labels"><span>RUN ${pct(parseFloat(runPct))}</span><span>PASS ${pct(parseFloat(passPct))}</span></div>
          <div class="split-bar">
            <div class="split-bar-run"  style="width:${runPct}%"></div>
            <div class="split-bar-pass" style="flex:1"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Yards by Quarter</div>
        <div class="qtr-bars">${qtrBars}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">Down Tendencies</div>
      <div class="dn-grid">
        ${[1,2,3,4].map(dn => {
          const d = downMap[dn.toString()];
          const rp = d.plays ? (d.run / d.plays * 100).toFixed(0) : 0;
          const pp = d.plays ? (d.pass / d.plays * 100).toFixed(0) : 0;
          return `<div class="dn-cell">
            <div class="dn-label">${dn === 1 ? '1st' : dn === 2 ? '2nd' : dn === 3 ? '3rd' : '4th'} Down</div>
            <div style="font-family:var(--mono);font-size:11px;margin-bottom:8px">
              <span style="color:var(--rush)">${rp}% RUN</span>
              <span style="color:var(--muted);margin:0 4px">·</span>
              <span style="color:var(--pass)">${pp}% PASS</span>
            </div>
            <div class="split-bar" style="margin-bottom:8px">
              <div class="split-bar-run"  style="width:${rp}%"></div>
              <div class="split-bar-pass" style="flex:1"></div>
            </div>
            <div class="dn-sub">${d.plays} plays · ${(d.yards / (d.plays || 1)).toFixed(1)} ypp</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderRun() {
  const maxCarries = Math.max(...rushers.map(r => r.carries));

  const tableRows = rushers.map(r => `<tr>
    <td><div class="player-cell"><span class="jersey">${r.jersey || '—'}</span>${shortName(r.name)}</div></td>
    <td class="amber-col">${r.carries}</td>
    <td>${r.yards}</td>
    <td>${r.avg}</td>
    <td class="td-count">${r.tds}</td>
    <td>${r.long}</td>
    <td class="${r.fumbles ? 'turn-count' : ''}">${r.fumbles || '—'}</td>
  </tr>`).join('');

  const maxConYds = topRunConcepts.length ? Math.max(...topRunConcepts.map(c => c.count)) : 1;

  const conceptBars = topRunConcepts.map(c => {
    const pct = Math.round(c.count / maxConYds * 100);
    return `<div class="bar-row">
      <div class="bar-label">${c.name.slice(0, 20)}</div>
      <div class="bar-track">
        <div class="bar-fill-run" style="width:${pct}%"></div>
      </div>
      <div class="bar-val" style="color:var(--text)">${c.count} <span style="color:var(--muted);font-size:9px">${c.avg}avg</span></div>
    </div>`;
  }).join('');

  return `
    <div class="section-head">Rushing Breakdown</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Player</th><th>CAR</th><th>YDS</th><th>AVG</th><th>TD</th><th>LONG</th><th>FUM</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-head">Run Concept Frequency</div>
      <div class="card">
        <div class="bar-chart">${conceptBars}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">Run Plays by Formation</div>
      <div class="card">
        <div class="bar-chart">
          ${formations.filter(f => f.run > 0).slice(0, 14).map(f => {
            const mx = formations[0].total;
            const pct = Math.round(f.run / mx * 100);
            return `<div class="bar-row">
              <div class="bar-label">${f.name.slice(0,18)}</div>
              <div class="bar-track">
                <div class="bar-fill-run" style="width:${pct}%"></div>
              </div>
              <div class="bar-val">${f.run}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderPass() {
  const qbRows = qbs.map(q => {
    const cr = q.att ? (q.comp / q.att * 100).toFixed(0) : 0;
    return `<tr>
      <td><div class="player-cell"><span class="jersey">${q.jersey || '—'}</span>${shortName(q.name)}</div></td>
      <td class="amber-col">${q.comp}/${q.att}</td>
      <td class="amber-col">${cr}%</td>
      <td>${q.yards}</td>
      <td class="td-count">${q.tds}</td>
      <td class="turn-count">${q.ints}</td>
      <td class="${q.sacks ? 'turn-count' : ''}">${q.sacks}</td>
      <td>${q.scrm} (${q.scrmYds} yds)</td>
    </tr>`;
  }).join('');

  const recvRows = receivers.map(r => {
    const catchRate = r.targets ? (r.catches / r.targets * 100).toFixed(0) : 0;
    return `<tr>
      <td><div class="player-cell"><span class="jersey">${r.jersey || '—'}</span>${shortName(r.name)}</div></td>
      <td class="amber-col">${r.catches}/${r.targets}</td>
      <td>${catchRate}%</td>
      <td>${r.yards}</td>
      <td>${r.avg}</td>
      <td class="td-count">${r.tds}</td>
      <td>${r.long}</td>
    </tr>`;
  }).join('');

  const maxConcept = topPassConcepts.length ? Math.max(...topPassConcepts.map(c => c.att)) : 1;
  const conceptBars = topPassConcepts.map(c => {
    const p = Math.round(c.att / maxConcept * 100);
    const cp = c.att ? Math.round(c.comp / c.att * 100) : 0;
    return `<div class="bar-row">
      <div class="bar-label">${c.name.slice(0, 20)}</div>
      <div class="bar-track">
        <div class="bar-fill-pass" style="width:${p}%"></div>
      </div>
      <div class="bar-val" style="color:var(--text)">${c.att} <span style="color:var(--muted);font-size:9px">${cp}%</span></div>
    </div>`;
  }).join('');

  return `
    <div class="section-head">QB Stats</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>QB</th><th>CMP/ATT</th><th>PCT</th><th>YDS</th><th>TD</th><th>INT</th><th>SCK</th><th>SCRM</th>
        </tr></thead>
        <tbody>${qbRows}</tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-head">Receiver Stats</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Receiver</th><th>REC/TGT</th><th>PCT</th><th>YDS</th><th>AVG</th><th>TD</th><th>LONG</th>
          </tr></thead>
          <tbody>${recvRows}</tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-head">Pass Concept Frequency</div>
      <div class="card">
        <div class="bar-chart">${conceptBars}</div>
      </div>
    </div>
  `;
}

function renderFormations() {
  const maxTotal = formations[0] ? formations[0].total : 1;
  const bars = formations.map(f => {
    const runW  = (f.run  / maxTotal * 100).toFixed(1);
    const passW = (f.pass / maxTotal * 100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-label" title="${f.name}">${f.name.slice(0, 22)}</div>
      <div class="bar-track">
        <div class="bar-fill-stack" style="width:${(f.total/maxTotal*100).toFixed(1)}%">
          <div class="bar-fill-run"  style="width:${(f.run/f.total*100).toFixed(1)}%;"></div>
          <div class="bar-fill-pass" style="flex:1;"></div>
        </div>
      </div>
      <div class="bar-val">${f.total}</div>
    </div>`;
  }).join('');

  const tableRows = formations.map(f => {
    const rp = f.total ? (f.run  / f.total * 100).toFixed(0) : 0;
    const pp = f.total ? (f.pass / f.total * 100).toFixed(0) : 0;
    return `<tr>
      <td>${f.name}</td>
      <td class="amber-col">${f.total}</td>
      <td class="rush-col">${f.run} (${rp}%)</td>
      <td class="pass-col">${f.pass} (${pp}%)</td>
      <td>${f.yards}</td>
      <td>${f.ypp}</td>
      <td class="td-count">${f.tds}</td>
    </tr>`;
  }).join('');

  return `
    <div class="section-head">Formation Usage — <span style="color:var(--rush)">■ RUN</span> <span style="color:var(--pass);margin-left:10px">■ PASS</span></div>
    <div class="card">
      <div class="bar-chart">${bars}</div>
    </div>

    <div class="section">
      <div class="section-head">Formation Detail</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Formation</th><th>PLAYS</th><th>RUN</th><th>PASS</th><th>YARDS</th><th>YPP</th><th>TD</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderGamePlan() {
  // Top formation by usage
  const topForm  = formations[0] ? formations[0].name : 'N/A';
  const topFormPct = totalPlays ? (formations[0].total / totalPlays * 100).toFixed(0) : 0;

  // Most used rusher
  const leadRusher = rushers[0];

  // Most targeted receiver
  const leadRecv = receivers[0];

  // Most used run concept
  const topRunPlay = topRunConcepts[0];

  // Most used pass concept
  const topPassPlay = topPassConcepts[0];

  // 1st down split
  const d1 = downMap['1'];
  const d1RunPct = d1.plays ? (d1.run / d1.plays * 100).toFixed(0) : 0;

  // 3rd down
  const d3 = downMap['3'];
  const d3PassPct = d3.plays ? (d3.pass / d3.plays * 100).toFixed(0) : 0;

  const tendencies = [
    { stat: pct(parseFloat(d1RunPct)), label: '1st Down Run Rate', text: `On 1st down, ${d1RunPct}% of plays are run plays. Primary ball carrier is ${leadRusher ? leadRusher.name : 'N/A'} (#${leadRusher ? leadRusher.jersey : '—'}) with ${leadRusher ? leadRusher.carries : 0} carries (${leadRusher ? leadRusher.avg : '—'} avg).` },
    { stat: pct(parseFloat(d3PassPct)), label: '3rd Down Pass Rate', text: `On 3rd down, ${d3PassPct}% of plays are passes. Conversion rate is ${pct(thirdRate)} (${thirdConv}/${thirdDowns.length}).` },
    { stat: topFormPct + '%', label: 'Top Formation Usage', text: `${topForm} is the base formation (${topFormPct}% of plays). Expect to see this grouping on both run and pass downs.` },
    { stat: leadRecv ? leadRecv.targets : '—', label: 'Primary Target', text: `${leadRecv ? shortName(leadRecv.name) : 'N/A'} (#${leadRecv ? leadRecv.jersey : '—'}) leads with ${leadRecv ? leadRecv.targets : 0} targets (${leadRecv ? leadRecv.catches : 0} catches, ${leadRecv ? leadRecv.yards : 0} yds, ${leadRecv ? leadRecv.tds : 0} TDs).` },
    { stat: explosive.length, label: 'Explosive Plays (15+)', text: `${explosive.length} plays gained 15+ yards. Top play: ${explosive[0] ? explosive[0]['OFF PLAY'] : 'N/A'} (${explosive[0] ? '+' + yds(explosive[0]) : 0} yds) out of ${explosive[0] ? explosive[0]['OFF FORM'] : ''}.` },
    { stat: pct(rzRate), label: 'Red Zone Efficiency', text: `Inside the opponent's 20, WilHi has ${rzTDs} TDs on ${redZone.length} plays (${pct(rzRate)}). Turnovers cost ${turnovers} drives.` },
  ];

  const tendHTML = tendencies.map(t => `
    <div class="tendency-item">
      <div class="tend-num">${t.stat}</div>
      <div>
        <div class="tend-label">${t.label}</div>
        <div class="tend-text">${t.text}</div>
      </div>
    </div>`).join('');

  const topExplosive = explosive.slice(0, 15).map(r => {
    const actor = r['RECEIVER_Name'] ? shortName(r['RECEIVER_Name']) : (r['RUSHER_Name'] ? shortName(r['RUSHER_Name']) : '');
    return `<tr>
      <td>${r['PLAY TYPE']}</td>
      <td>${r['OFF FORM']}</td>
      <td>${r['OFF PLAY']}</td>
      <td>${actor}</td>
      <td class="amber-col">+${yds(r)}</td>
      <td>${isTD(r) ? '<span style="color:var(--td);font-weight:bold">TD</span>' : 'Q' + r['QTR']}</td>
    </tr>`;
  }).join('');

  return `
    <div class="section-head">Key Tendencies</div>
    <div class="tendency-list">${tendHTML}</div>

    <div class="section">
      <div class="section-head">Explosive Play Log (15+ Yards)</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Type</th><th>Formation</th><th>Play</th><th>Player</th><th>Yards</th><th>Result</th>
          </tr></thead>
          <tbody>${topExplosive}</tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-head">Best Run Concepts (min 3 carries)</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Play</th><th>CAR</th><th>YDS</th><th>AVG</th><th>TD</th>
          </tr></thead>
          <tbody>
            ${topRunConcepts.filter(c => c.count >= 3).sort((a,b) => parseFloat(b.avg)-parseFloat(a.avg)).slice(0,10).map(c => `<tr>
              <td>${c.name}</td>
              <td>${c.count}</td>
              <td>${c.yards}</td>
              <td class="amber-col">${c.avg}</td>
              <td class="td-count">${c.tds}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  TAB NAVIGATION
// ─────────────────────────────────────────────
const TABS = [
  { id: 'overview', label: 'Overview',   render: renderOverview },
  { id: 'run',      label: 'Run Game',   render: renderRun },
  { id: 'pass',     label: 'Pass Game',  render: renderPass },
  { id: 'form',     label: 'Formations', render: renderFormations },
  { id: 'gameplan', label: 'Game Plan',  render: renderGamePlan },
];

function initTabs() {
  const tabRow = document.getElementById('tabRow');
  TABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.dataset.tab = t.id;
    btn.addEventListener('click', () => switchTab(t.id));
    tabRow.appendChild(btn);
  });
}

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  TABS.forEach(t => {
    const el = document.getElementById('tab-' + t.id);
    if (t.id === id) {
      el.classList.add('active');
      if (!el._rendered) { el.innerHTML = t.render(); el._rendered = true; }
    } else {
      el.classList.remove('active');
    }
  });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
initTabs();
document.getElementById('hdrMeta').textContent = `${totalPlays} plays · ${plays.length > 0 ? [...new Set(plays.map(r=>r['QTR']))].sort().join(',') : ''} qtrs`;
// Render first tab
const firstPane = document.getElementById('tab-overview');
firstPane.innerHTML = renderOverview();
firstPane._rendered = true;
})();
</script>
